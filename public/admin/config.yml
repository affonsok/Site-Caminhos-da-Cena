backend:
  name: git-gateway
  branch: main

locale: pt
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "configuracoes"
    label: "Configurações do Site"
    delete: false
    editor:
      preview: false
    files:
      - name: "instagram"
        label: "Instagram Ticker"
        file: "content/settings/instagram.json"
        fields:
          - { label: "Username do Instagram", name: "username", widget: "string", default: "grupo.passos" }
          - { label: "Link do Perfil", name: "profileUrl", widget: "string", default: "https://www.instagram.com/grupo.passos/" }
          - {
              label: "Fotos Recentes (Ticker)",
              name: "posts",
              widget: "list",
              allow_add: true,
              max: 20,
              fields: [
                { label: "Imagem", name: "image", widget: "image" },
                { label: "Legenda/Conteúdo do Post", name: "caption", widget: "text", required: false },
                { label: "Link do Post Original", name: "link", widget: "string", required: false }
              ]
            }

  - name: "noticias"
    label: "Notícias"

    folder: "content/noticias"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} ({{date}})"
    fields:
      - { label: "ID", name: "id", widget: "hidden", default: "news-{{timestamp}}" }
      - { label: "Slug", name: "slug", widget: "slug_auto" }
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "string", hint: "Ex: 12 Abr, 2024" }
      - { label: "Resumo", name: "excerpt", widget: "text" }
      - { label: "Conteúdo", name: "content", widget: "markdown" }
      - { label: "Imagem Principal", name: "image", widget: "image" }
      - {
          label: "Galeria",
          name: "gallery",
          widget: "list",
          summary: "{{fields.image}}",
          field: { label: "Imagem", name: "image", widget: "image" },
          required: false
        }

  - name: "galeria"
    label: "Galeria de Fotos (Álbuns)"
    folder: "content/galeria"
    create: true
    slug: "{{title}}"
    extension: "json"
    format: "json"
    summary: "{{title}} ({{year}}) - {{photos.length}} fotos"
    fields:
      - { label: "Título do Álbum", name: "title", widget: "string" }
      - { label: "Ano", name: "year", widget: "string", hint: "Ex: 2024" }
      - { label: "Imagem de Capa", name: "image", widget: "image", hint: "Imagem que aparecerá na listagem principal" }
      - {
          label: "Fotos do Álbum",
          name: "photos",
          widget: "list",
          summary: "{{fields.caption}}",
          fields: [
            { label: "Foto", name: "image", widget: "image" },
            { label: "Legenda (Opcional)", name: "caption", widget: "string", required: false }
          ]
        }

  - name: "patrocinadores"
    label: "Patrocinadores e Apoio"
    folder: "content/patrocinadores"
    create: true
    slug: "{{name}}"
    extension: "json"
    format: "json"
    summary: "{{name}}"
    fields:
      - { label: "Nome", name: "name", widget: "string" }
      - { label: "Logotipo", name: "logo", widget: "image" }

  - name: "espetaculos"
    label: "Espetáculos"
    folder: "content/espetaculos"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} ({{year}})"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "slug_auto" }
      - { 
          label: "Categoria", 
          name: "category", 
          widget: "select", 
          create: true,
          options: ["Comédia", "Drama", "Musical", "Experimental", "Infantil", "Teatro de Rua"]
        }
      - { label: "Ano de Lançamento", name: "year", widget: "string" }
      - { 
          label: "Status", 
          name: "status", 
          widget: "select", 
          options: ["Em Cartaz", "Em Turnê", "Encerrado", "Pré-produção"],
          default: "Em Cartaz"
        }
      - { label: "Imagem de Capa (Card)", name: "image", widget: "image" }
      - { label: "Imagem do Banner (Hero)", name: "heroImage", widget: "image" }
      - { label: "Sinopse", name: "synopsis", widget: "markdown" }
      - { 
          label: "Elenco / Equipe (Integrantes)", 
          name: "cast", 
          widget: "list", 
          summary: "{{fields.name}} - {{fields.role}}",
          fields: [
            { 
              label: "Integrante", 
              name: "name", 
              widget: "relation", 
              collection: "integrantes",
              search_fields: ["name"],
              value_field: "name",
              display_fields: ["name"]
            },
            { 
              label: "Papel / Função nesta peça", 
              name: "role", 
              widget: "select", 
              create: true,
              options: ["Elenco", "Ator", "Atriz", "Direção", "Produção", "Iluminação", "Cenografia", "Figurino", "Sonoplastia"]
            }
          ]
        }
      - { 
          label: "Ficha Técnica Geral", 
          name: "techSheet", 
          widget: "list", 
          summary: "{{fields.label}}: {{fields.value}}",
          fields: [
            { 
              label: "Rótulo", 
              name: "label", 
              widget: "select", 
              create: true,
              options: ["Texto e Direção", "Direção Musical", "Preparação Vocal", "Mascareiro", "Dir. de Produção e Figurino", "Assistente de Produção", "Trilha Sonora", "Projeções", "Cenografia", "Duração", "Classificação"]
            },
            { label: "Nome(s) / Valor", name: "value", widget: "string" }
          ]
        }
      - { label: "Apoio / Patrocínio", name: "support", widget: "string", required: false }
      - { 
          label: "Galeria de Fotos", 
          name: "gallery", 
          widget: "list", 
          field: { label: "Imagem", name: "image", widget: "image" } 
        }

  - name: "integrantes"
    label: "Integrantes"
    folder: "content/integrantes"
    create: true
    slug: "{{name}}"
    extension: "json"
    format: "json"
    summary: "{{name}} ({{category}})"
    fields:
      - { label: "Nome Completo", name: "name", widget: "string" }
      - { 
          label: "Funções Padrão", 
          name: "roles", 
          widget: "select", 
          multiple: true,
          create: true,
          options: ["Ator", "Atriz", "Diretor", "Diretora", "Dramaturgo", "Dramaturga", "Preparação Vocal", "Mascareiro", "Direção de Produção", "Figurino", "Assistente de Produção", "Direção Musical"]
        }
      - { 
          label: "Categoria", 
          name: "category", 
          widget: "select", 
          create: true, 
          options: ["Elenco", "Direção & Produção", "Equipe Artística", "Associação"],
          default: "Elenco"
        }
      - { label: "Foto", name: "image", widget: "image", default: "/images/integrantes/placeholder.jpg" }
      - { label: "Instagram (URL)", name: "instagram", widget: "string", required: false, default: "https://instagram.com/" }
      - { label: "Bio Curta", name: "bio", widget: "text", required: false }

  - name: "clipping"
    label: "Clipping"
    folder: "content/clipping"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} ({{source}})"
    fields:
      - { label: "ID", name: "id", widget: "hidden", default: "clipping-{{timestamp}}" }
      - { label: "Slug", name: "slug", widget: "slug_auto" }
      - { label: "Fonte", name: "source", widget: "string", hint: "Ex: Jornal de Artes" }
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "string", hint: "Ex: Março 2024" }
      - { label: "Resumo", name: "summary", widget: "text" }
      - { label: "Conteúdo Completo", name: "fullContent", widget: "markdown" }
      - { label: "Link da Matéria Original", name: "href", widget: "string", required: false, default: "#" }
